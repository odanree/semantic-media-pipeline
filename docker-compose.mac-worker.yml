# ============================================================================
# Mac Remote Worker — connects to Windows PC master over local network
#
# Usage:
#   docker compose -f docker-compose.mac-worker.yml --env-file .env.mac-worker up --build
#
# Prerequisites:
#   1. Windows PC running: docker compose up -d  (starts MinIO on port 9000)
#   2. MinIO bucket 'lumen-media' populated: mc mirror J:\ lumen/lumen-media --watch
#   3. Windows PC ports reachable: 6379, 6333, 6334, 5432, 9000
#   4. .env.mac-worker has correct IP and DB password
#   NO SMB mount needed — Mac worker reads media via MinIO over HTTP.
# ============================================================================

services:
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile.mac
    container_name: lumen-worker-mac
    command: >
      sh -c "celery -A celery_app worker
      --loglevel=info
      --concurrency=${CELERY_CONCURRENCY:-2}
      --prefetch-multiplier=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      --max-tasks-per-child=${CELERY_MAX_TASKS_PER_CHILD:-50}
      --queues=celery,proxies
      --hostname=mac-worker@%h"
    env_file:
      - .env.mac-worker
    environment:
      # Stable identifier — shows as "mac-1" in /api/stats/processing worker_id column
      - WORKER_ID=${WORKER_ID:-mac-1}
      # Frame cache: write to the named volume (persists across restarts)
      # Without this, the worker falls back to /tmp/lumen_frame_cache (ephemeral).
      - FRAME_CACHE_DIR=/mnt/frame_cache
      # S3/MinIO source storage — replaces SMB mount.
      # Windows PC hosts MinIO at 9000; mac worker reaches it over LAN.
      - STORAGE_BACKEND=s3
      - S3_ENDPOINT_URL=http://windows-pc:9000
      - S3_BUCKET=${S3_BUCKET:-lumen-media}
      - S3_ACCESS_KEY=${MINIO_ROOT_USER:-minioadmin}
      - S3_SECRET_KEY=${MINIO_ROOT_PASSWORD:-minioadmin}
      - S3_REGION=us-east-1
    volumes:
      # Frame cache only — SMB mount removed; media served via MinIO over HTTP.
      - mac_frame_cache:/mnt/frame_cache
    restart: unless-stopped
    extra_hosts:
      # Allow container to reach Windows PC by hostname if needed
      - "windows-pc:192.168.1.137"

volumes:
  mac_frame_cache:
    # Local Docker-managed volume — always writable, no SMB dependency.
    # Named so it persists across `docker compose down` restarts.
