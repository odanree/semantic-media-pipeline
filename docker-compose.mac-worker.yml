version: '3.9'

# ============================================================================
# Mac Remote Worker — connects to Windows PC master over local network
#
# Usage:
#   docker compose -f docker-compose.mac-worker.yml --env-file .env.mac-worker up --build
#
# Prerequisites:
#   1. SMB share mounted: open smb://danh@outlook.com@192.168.1.137/lumen-media
#   2. Windows PC ports reachable: 6379, 6333, 6334, 5432
#   3. .env.mac-worker has correct IP and DB password
# ============================================================================

services:
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile.mac
    container_name: lumen-worker-mac
    command: >
      sh -c "celery -A celery_app worker
      --loglevel=info
      --concurrency=${CELERY_CONCURRENCY:-2}
      --prefetch-multiplier=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      --max-tasks-per-child=${CELERY_MAX_TASKS_PER_CHILD:-50}
      --queues=celery,proxies
      --hostname=mac-worker@%h"
    env_file:
      - .env.mac-worker
    volumes:
      # SMB mount passthrough — Mac host path → container path
      # Must match MEDIA_SOURCE_PATH in .env.mac-worker but inside container
      - /Volumes/lumen-media-1:/mnt/source:ro
      # Centralized frame cache — reads/writes to Windows PC over SMB.
      # Same physical directory as FRAME_CACHE_DIR on Windows host.
      # Share: lumen-media/frame_cache — no extra SMB share needed.
      # Write speed over SMB is fine: frames are written once, read many times.
      - /Volumes/lumen-media-1/frame_cache:/mnt/frame_cache
    restart: unless-stopped
    extra_hosts:
      # Allow container to reach Windows PC by hostname if needed
      - "windows-pc:192.168.1.137"
