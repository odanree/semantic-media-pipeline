
# ============================================================================
# Standalone monitoring stack — Prometheus + Grafana for all Lumen environments
#
# Launch:    docker compose -f docker-compose.monitoring.yml up -d
# Tear down: docker compose -f docker-compose.monitoring.yml down
#
# Ports:
#   Prometheus  127.0.0.1:9092  (lumen1: 9090, lumen2: 9091)
#   Grafana     127.0.0.1:3004  (lumen1: 3001, lumen2: 3003)
#
# Requires both lumen1 and lumen2 stacks to be up for all targets to resolve.
# Prod is scraped directly over the internet (see prometheus.monitoring.yml).
# ============================================================================

name: lumen-monitoring

services:
  prometheus-monitoring:
    image: prom/prometheus:latest
    container_name: lumen-monitoring-prometheus
    ports:
      - "127.0.0.1:9092:9090"
    volumes:
      - ./prometheus.monitoring.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-sd:/etc/prometheus/sd:ro
      - prometheus_monitoring_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - monitoring-net
      - lumen1-net
      - lumen2-net
    restart: unless-stopped

  grafana-monitoring:
    image: grafana/grafana:latest
    container_name: lumen-monitoring-grafana
    ports:
      - "127.0.0.1:3004:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set}
    volumes:
      - grafana_monitoring_data:/var/lib/grafana
      - ./grafana/monitoring/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus-monitoring
    networks:
      - monitoring-net
    restart: unless-stopped

volumes:
  prometheus_monitoring_data:
  grafana_monitoring_data:

networks:
  monitoring-net:
    driver: bridge
  lumen1-net:
    name: lumen1_lumen-net
    external: true
  lumen2-net:
    name: lumen2_lumen2-net
    external: true
