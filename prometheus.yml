# Prometheus metrics configuration — lumen1 stack
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'lumen-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'

  - job_name: 'lumen-flower'
    static_configs:
      - targets: ['flower:5555']
    metrics_path: '/metrics'
