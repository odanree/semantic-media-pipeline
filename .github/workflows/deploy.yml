name: Deploy to Production

on:
  # Run after CI completes on main so we never deploy code that failed tests.
  # workflow_dispatch retains a manual escape hatch for hotfixes.
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      no_cache:
        description: 'Force --no-cache rebuild (use when pip deps are stale)'
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy to Hetzner
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    # Skip if triggered by workflow_run that failed (manual dispatch always runs)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout (for path detection only)
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # need previous commit to detect changed files

      # ------------------------------------------------------------------
      # Detect which service directories changed and build the deploy command.
      # Collapsed into one step to avoid GitHub Actions outputs passing issues.
      # Falls back to building all services if detection is ambiguous.
      # ------------------------------------------------------------------
      - name: Detect changed services and build deploy command
        id: script
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "all")
          echo "Changed files: $CHANGED"

          SERVICES=""
          echo "$CHANGED" | grep -qE '^api/|^Dockerfile'    && SERVICES="$SERVICES api"
          echo "$CHANGED" | grep -qE '^worker/'             && SERVICES="$SERVICES worker"
          echo "$CHANGED" | grep -qE '^frontend/'           && SERVICES="$SERVICES frontend"

          NO_CACHE_FLAG=""
          [ "${{ inputs.no_cache }}" = "true" ] && NO_CACHE_FLAG="--no-cache"

          if [ -n "$SERVICES" ]; then
            BUILD_CMD="DOCKER_BUILDKIT=1 docker compose build --parallel $NO_CACHE_FLAG $SERVICES"
          else
            BUILD_CMD="echo 'No image rebuild needed'"
          fi

          echo "build_cmd=$BUILD_CMD" >> "$GITHUB_OUTPUT"
          echo "Services to rebuild: $SERVICES"

      # ------------------------------------------------------------------
      # SSH into server and deploy
      # ------------------------------------------------------------------
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          timeout: 15m
          script: |
            set -e
            cd /opt/lumen

            echo "=== Pulling latest code ==="
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            echo "=== Syncing Caddyfile ==="
            if [ -f /opt/lumen/Caddyfile ]; then
              cp /opt/lumen/Caddyfile /etc/caddy/Caddyfile
              caddy reload --config /etc/caddy/Caddyfile 2>/dev/null || true
              echo "Caddy reloaded ✓"
            fi

            echo "=== Rebuilding changed services ==="
            ${{ steps.script.outputs.build_cmd }}

            echo "=== Restarting services ==="
            docker compose up -d

            echo "=== Health check ==="
            for i in $(seq 1 36); do
              if curl -sf http://localhost:8000/api/ping > /dev/null 2>&1; then
                echo "API healthy ✓"
                break
              fi
              if [ "$i" -eq 36 ]; then
                echo "Health check failed after 180s" && exit 1
              fi
              echo "Waiting for API... ($i/36)"
              sleep 5
            done

            echo "Deploy complete ✓"
