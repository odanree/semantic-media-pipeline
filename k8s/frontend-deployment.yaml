# =============================================================================
# Next.js Frontend Deployment + Service + Ingress
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumen-frontend
  namespace: lumen
  labels:
    app.kubernetes.io/name: lumen
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: lumen
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lumen
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/your-org/lumen-frontend:latest  # Replace with your registry
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: API_URL
              value: "http://lumen-api:8000"
            - name: NEXT_PUBLIC_API_URL
              value: "http://lumen-api:8000"
            - name: NEXT_PUBLIC_QDRANT_HOST
              value: "qdrant"
            - name: NEXT_PUBLIC_QDRANT_PORT
              value: "6333"
            - name: MEDIA_ROOT
              value: "/data/media"
          volumeMounts:
            - name: media-data
              mountPath: /data/media
              readOnly: true
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
      volumes:
        - name: media-data
          persistentVolumeClaim:
            claimName: media-data-pvc
      restartPolicy: Always

---
# =============================================================================
# Frontend Service
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: lumen-frontend
  namespace: lumen
  labels:
    app.kubernetes.io/name: lumen
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: lumen
    app.kubernetes.io/component: frontend

---
# =============================================================================
# Frontend Ingress
# =============================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lumen-frontend-ingress
  namespace: lumen
  labels:
    app.kubernetes.io/name: lumen
    app.kubernetes.io/component: frontend
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - lumen.example.com           # Replace with your domain
      secretName: lumen-frontend-tls
  rules:
    - host: lumen.example.com         # Replace with your domain
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lumen-frontend
                port:
                  number: 3000
