apiVersion: v1
kind: Secret
metadata:
  name: lumen-secrets
  namespace: lumen
  labels:
    app.kubernetes.io/name: lumen
type: Opaque
# echo -n 'value' | base64
data:
  # Database
  DATABASE_PASSWORD: c2VjdXJlX3Bhc3N3b3JkX2hlcmU=  # secure_password_here
  DATABASE_USER: bHVtZW5fdXNlcg==                     # lumen_user
  DATABASE_NAME: bHVtZW4=                               # lumen

  # S3 (optional)
  S3_ACCESS_KEY: bWluaW9hZG1pbg==                       # minioadmin
  S3_SECRET_KEY: bWluaW9hZG1pbg==                       # minioadmin
