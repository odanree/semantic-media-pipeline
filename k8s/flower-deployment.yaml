# =============================================================================
# Flower (Celery Monitoring) Deployment + Service
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumen-flower
  namespace: lumen
  labels:
    app.kubernetes.io/name: lumen
    app.kubernetes.io/component: flower
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: lumen
      app.kubernetes.io/component: flower
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lumen
        app.kubernetes.io/component: flower
    spec:
      containers:
        - name: flower
          image: mher/flower:2.0.1
          ports:
            - containerPort: 5555
              name: http
              protocol: TCP
          env:
            - name: CELERY_BROKER_URL
              valueFrom:
                configMapKeyRef:
                  name: lumen-config
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                configMapKeyRef:
                  name: lumen-config
                  key: CELERY_RESULT_BACKEND
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: 5555
            initialDelaySeconds: 15
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: 5555
            initialDelaySeconds: 10
            periodSeconds: 10
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: lumen-flower
  namespace: lumen
  labels:
    app.kubernetes.io/name: lumen
    app.kubernetes.io/component: flower
spec:
  type: ClusterIP
  ports:
    - port: 5555
      targetPort: 5555
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: lumen
    app.kubernetes.io/component: flower
