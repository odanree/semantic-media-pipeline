
services:
  # =========================================================================
  # Data & Message Queue Layer
  # =========================================================================
  redis:
    image: redis:7.4.8-alpine
    container_name: lumen-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lumen-net
    restart: unless-stopped

  postgres:
    image: postgres:17.9-alpine
    container_name: lumen-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER:-lumen_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-secure_password_here}
      POSTGRES_DB: ${DATABASE_NAME:-lumen}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-lumen_user} -d ${DATABASE_NAME:-lumen}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lumen-net
    restart: unless-stopped

  # =========================================================================
  # Object Storage (MinIO) — S3-compatible, used by Mac worker as SMB replacement
  # =========================================================================
  minio:
    image: minio/minio:latest
    container_name: lumen-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API (workers + mc CLI)
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
    volumes:
      # J:\ is MinIO's data directory directly — zero copy, no duplication.
      # MinIO writes only a small .minio.sys metadata folder to J:\.
      # All media files are served in-place from J:\.
      # Requires J:\ to be shared in Docker Desktop → Resources → File Sharing.
      - ${MEDIA_SOURCE_PATH:-J:/}:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - lumen-net
    restart: unless-stopped

  # =========================================================================
  # Vector Database Layer
  # =========================================================================
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: lumen-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT_API_KEY: ""
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lumen-net
    restart: unless-stopped

  # =========================================================================
  # ML Worker (Celery + CLIP + FFmpeg)
  # =========================================================================
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
      args:
        - PYTHON_VERSION=3.10
        - USE_GPU=false
    container_name: lumen-worker
    # Shell form so env vars are expanded at runtime (not build time)
    command: >
      sh -c "celery -A celery_app worker
      --loglevel=info
      --concurrency=$${CELERY_CONCURRENCY:-4}
      --prefetch-multiplier=$${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      --max-tasks-per-child=$${CELERY_MAX_TASKS_PER_CHILD:-50}
      --queues=celery,proxies"
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://lumen-redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://lumen-redis:6379/0}
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_ASYNC_URL=${DATABASE_ASYNC_URL}
      - QDRANT_HOST=${QDRANT_HOST:-lumen-qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - QDRANT_GRPC_PORT=${QDRANT_GRPC_PORT:-6334}
      - MEDIA_ROOT=${MEDIA_ROOT:-/data/media}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      # Worker throttling — tune in .env to match available RAM
      # Rule of thumb: CELERY_CONCURRENCY = floor(free_RAM_GB / 2)
      # Each worker: ~600MB CLIP model + ~400MB FFmpeg buffers per 4K video
      - CELERY_CONCURRENCY=${CELERY_CONCURRENCY:-4}
      - CELERY_WORKER_PREFETCH_MULTIPLIER=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      - CELERY_MAX_TASKS_PER_CHILD=${CELERY_MAX_TASKS_PER_CHILD:-50}
      - CELERY_MAX_MEMORY_PER_CHILD=${CELERY_MAX_MEMORY_PER_CHILD:-1500000}
      # Proxy sidecar: faststart copies land here (source stays :ro)
      - PROXY_ROOT=${PROXY_ROOT:-/mnt/proxies}
      # Proxy skip threshold: non-H264 files longer than this (seconds) are
      # not transcoded. H264 files always get a fast stream-copy proxy.
      - PROXY_MAX_DURATION_SECS=${PROXY_MAX_DURATION_SECS:-3600}
      # Observability: stable worker identifier for Mac vs Windows attribution in stats
      - WORKER_ID=${WORKER_ID:-windows-1}
      # Frame cache: always /mnt/frame_cache inside container (bind handles host-side path)
      - FRAME_CACHE_DIR=/mnt/frame_cache
    user: root
    volumes:
      - media_data:/data/media
      - worker_tmp:/tmp/lumen_frames
      - proxies_data:/mnt/proxies        # Faststart proxy cache (:rw — worker writes here)
      - /usr/lib/wsl/lib:/usr/lib/wsl/lib  # WSL2 DirectX driver mapping
      - ${MEDIA_SOURCE_PATH}:/mnt/source:ro # Host media library (path set in .env)
      - ${FRAME_CACHE_DIR:-/tmp/lumen_frame_cache}:/mnt/frame_cache # Shared frame cache (rw)
      # Development: Mount worker code for hot-reload (comment out for production)
      # - ./worker:/app/worker
      # - ./scripts:/app/scripts
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - lumen-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
    # -----------------------------------------------------------------------
    # GPU passthrough (currently blocked by Docker Desktop + AMD limitation)
    # DirectML detects AMD GPUs in native WSL2 but Docker Desktop's VM
    # does not expose them via DXCore. The worker will fall back to CPU.
    # Uncomment when Docker Desktop adds AMD GPU support:
    # -----------------------------------------------------------------------
    # devices:
    #   - /dev/dxg:/dev/dxg

  # =========================================================================
  # FastAPI Backend
  # =========================================================================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: lumen-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://lumen-redis:6379/0}
      - DATABASE_ASYNC_URL=${DATABASE_ASYNC_URL}
      - QDRANT_HOST=${QDRANT_HOST:-lumen-qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - MEDIA_ROOT=${MEDIA_ROOT:-/data/media}
      # Proxy sidecar: read proxies volume to serve faststart copies
      - PROXY_ROOT=${PROXY_ROOT:-/mnt/proxies}
    # Development: mount source for hot-reload (comment out for production)
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - media_data:/data/media
      - proxies_data:/mnt/proxies:ro      # Faststart proxy cache (:ro for API)
      - ${MEDIA_SOURCE_PATH}:/mnt/source:ro # Host media library (path set in .env)
      - ./api:/app                          # Development: hot-reload (comment out for production)
      - hf_cache:/root/.cache/huggingface   # Persist model downloads across rebuilds
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - lumen-net
    restart: unless-stopped

  # =========================================================================
  # Next.js Frontend
  # =========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into Next.js JS bundle at build time — must match the public URL
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_STREAM_URL: ${NEXT_PUBLIC_STREAM_URL:-http://localhost:8000}
    container_name: lumen-frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      # Server-side API endpoint (for Next.js API routes to proxy requests)
      - API_URL=http://api:8000
      # Client-side API endpoint (for WebSocket and browser-based requests)
      - NEXT_PUBLIC_API_URL=http://api:8000
      # Browser-direct URL for media streaming (bypasses Next.js proxy, no buffering)
      - NEXT_PUBLIC_STREAM_URL=${NEXT_PUBLIC_STREAM_URL:-http://localhost:8000}
      - NEXT_PUBLIC_QDRANT_HOST=qdrant
      - NEXT_PUBLIC_QDRANT_PORT=6333
    volumes:
      - media_data:/data/media
      - ${MEDIA_SOURCE_PATH}:/mnt/source:ro # Host media library (for video streaming)
    depends_on:
      - api
    networks:
      - lumen-net
    restart: unless-stopped

  # =========================================================================
  # Celery Monitoring (Flower)
  # =========================================================================
  flower:
    image: mher/flower:2.0.1
    container_name: lumen-flower
    command: >
      celery flower
      --broker=${CELERY_BROKER_URL:-redis://lumen-redis:6379/0}
      --purge_offline_workers=30
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    depends_on:
      - redis
      - worker
    networks:
      - lumen-net
    restart: unless-stopped

  # =========================================================================
  # Prometheus Metrics (Optional)
  # =========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: lumen-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - lumen-net
    restart: unless-stopped
    profiles:
      - monitoring

  # =========================================================================
  # Grafana Dashboard (Optional)
  # =========================================================================
  grafana:
    image: grafana/grafana:latest
    container_name: lumen-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:?GF_SECURITY_ADMIN_PASSWORD must be set}
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - lumen-net
    restart: unless-stopped
    profiles:
      - monitoring

# ============================================================================
# Named Volumes
# ============================================================================
volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  media_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MEDIA_ROOT:-/data/media}
  worker_tmp:
    driver: local
  proxies_data:
    driver: local
  hf_cache:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  lumen-net:
    driver: bridge
