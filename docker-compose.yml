
name: lumen1

services:
  # =========================================================================
  # Data & Message Queue Layer
  # =========================================================================
  redis:
    image: redis:7.4.8-alpine
    container_name: lumen-redis
    ports:
      - "127.0.0.1:6379:6379"  # Windows native worker access
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lumen-net
    restart: unless-stopped

  postgres:
    image: postgres:17.9-alpine
    container_name: lumen-postgres
    environment:
      POSTGRES_USER: ${DATABASE_USER:-lumen_user}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-secure_password_here}
      POSTGRES_DB: ${DATABASE_NAME:-lumen}
    ports:
      - "127.0.0.1:15432:5432"  # Native Windows worker access
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-lumen_user} -d ${DATABASE_NAME:-lumen}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lumen-net
    restart: unless-stopped

  # =========================================================================
  # Object Storage (MinIO) — S3-compatible, used by Mac worker as SMB replacement
  # =========================================================================
  minio:
    image: minio/minio:latest
    container_name: lumen-minio
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"   # S3 API (mc CLI admin — localhost only)
      - "127.0.0.1:9001:9001"  # Web console — localhost only
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set}
    volumes:
      # J:\ is MinIO's data directory directly — zero copy, no duplication.
      # MinIO writes only a small .minio.sys metadata folder to J:\.
      # All media files are served in-place from J:\.
      # Requires J:\ to be shared in Docker Desktop → Resources → File Sharing.
      - ${L1_MEDIA_1:-J:/}:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - lumen-net
    restart: unless-stopped

  # =========================================================================
  # Vector Database Layer
  # =========================================================================
  qdrant:
    image: qdrant/qdrant:v1.17.0
    container_name: lumen-qdrant
    ports:
      - "127.0.0.1:6333:6333"   # localhost only — local dev scripts connect via localhost
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT_API_KEY: ""
      QDRANT__STORAGE__MMAP_THRESHOLD_KB: "20000"
    mem_limit: 4g
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' 2>/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lumen-net
    restart: unless-stopped

  # =========================================================================
  # ML Worker (Celery + CLIP + FFmpeg)
  # =========================================================================
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
      args:
        - PYTHON_VERSION=3.10
        - USE_GPU=false
    container_name: lumen-worker
    # Shell form so env vars are expanded at runtime (not build time)
    command: >
      sh -c "celery -A celery_app worker
      --loglevel=info
      --pool=threads
      --concurrency=1
      -E
      --prefetch-multiplier=$${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      --max-tasks-per-child=$${CELERY_MAX_TASKS_PER_CHILD:-50}
      --queues=celery,proxies"
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://lumen-redis:6379/0
      - CELERY_RESULT_BACKEND=redis://lumen-redis:6379/0
      - DATABASE_URL=${DATABASE_URL}
      - DATABASE_ASYNC_URL=${DATABASE_ASYNC_URL}
      - QDRANT_HOST=${QDRANT_HOST:-lumen-qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - QDRANT_GRPC_PORT=${QDRANT_GRPC_PORT:-6334}
      - MEDIA_ROOT=${MEDIA_ROOT:-/data/media}
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - CELERY_CONCURRENCY=${CELERY_CONCURRENCY:-4}
      - CELERY_WORKER_PREFETCH_MULTIPLIER=${CELERY_WORKER_PREFETCH_MULTIPLIER:-1}
      - CELERY_MAX_TASKS_PER_CHILD=${CELERY_MAX_TASKS_PER_CHILD:-50}
      - CELERY_MAX_MEMORY_PER_CHILD=${CELERY_MAX_MEMORY_PER_CHILD:-1500000}
      - PROXY_ROOT=
      - PROXY_MAX_DURATION_SECS=${PROXY_MAX_DURATION_SECS:-3600}
      - SIDECAR_ROOT=/mnt/sidecars
      - WORKER_ID=${WORKER_ID:-windows-1}
      - FRAME_CACHE_DIR=/mnt/frame_cache
      - EMBEDDING_DEVICE=cpu
    user: root
    volumes:
      - media_data:/data/media
      - worker_tmp:/tmp/lumen_frames
      - proxies_data:/mnt/proxies
      - /usr/lib/wsl/lib:/usr/lib/wsl/lib
      - ${L1_MEDIA_1}:/mnt/source:ro
      - ${L1_MEDIA_2:-/tmp}:/mnt/i-media:ro
      - ${FRAME_CACHE_DIR:-/tmp/lumen_frame_cache}:/mnt/frame_cache
      - ./models:/app/models
      - J:/lumen1-sidecars:/mnt/sidecars
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - lumen-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G

  # =========================================================================
  # FastAPI Backend
  # =========================================================================
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: lumen-api
    ports:
      - "0.0.0.0:8000:8000"
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://lumen-redis:6379/0}
      - DATABASE_ASYNC_URL=${DATABASE_ASYNC_URL}
      - QDRANT_HOST=${QDRANT_HOST:-lumen-qdrant}
      - QDRANT_PORT=${QDRANT_PORT:-6333}
      - MEDIA_ROOT=${MEDIA_ROOT:-/data/media}
      - PROXY_ROOT=${PROXY_ROOT:-/mnt/proxies}
      - SIDECAR_ROOT=/mnt/sidecars
      - LUMEN_PATH_MAP_0=/mnt/source:J:/lumen-media
      - LUMEN_PATH_MAP_1=/mnt/i-media:I:/I-media
      - LD_LIBRARY_PATH=/usr/lib/wsl/lib
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - media_data:/data/media
      - proxies_data:/mnt/proxies:ro
      - ${L1_MEDIA_1}:/mnt/source:ro
      - ${L1_MEDIA_2:-/tmp}:/mnt/i-media:ro
      - ./api:/app
      - hf_cache:/root/.cache/huggingface
      - J:/lumen1-sidecars:/mnt/sidecars:ro
      - /usr/lib/wsl/lib:/usr/lib/wsl/lib
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, video]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - lumen-net
    restart: unless-stopped

  # =========================================================================
  # Next.js Frontend
  # =========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_STREAM_URL: ${NEXT_PUBLIC_STREAM_URL:-http://localhost:8000}
    container_name: lumen-frontend
    ports:
      - "127.0.0.1:3000:3000"  # Caddy reverse proxy only
    env_file:
      - .env
    environment:
      - API_URL=http://api:8000
      - NEXT_PUBLIC_API_URL=http://api:8000
      - NEXT_PUBLIC_STREAM_URL=${NEXT_PUBLIC_STREAM_URL:-http://localhost:8000}
      - NEXT_PUBLIC_QDRANT_HOST=qdrant
      - NEXT_PUBLIC_QDRANT_PORT=6333
      - BACKEND_API_KEY=${BACKEND_API_KEY:-}
    volumes:
      - media_data:/data/media
      - ${L1_MEDIA_1}:/mnt/source:ro
      - ${L1_MEDIA_2:-/tmp}:/mnt/i-media:ro
    depends_on:
      - api
    networks:
      - lumen-net
    restart: unless-stopped

  # =========================================================================
  # Celery Monitoring (Flower)
  # =========================================================================
  flower:
    image: mher/flower:2.0.1
    container_name: lumen-flower
    command: >
      celery flower
      --broker=${CELERY_BROKER_URL:-redis://lumen-redis:6379/0}
      --purge_offline_workers=1800
    ports:
      - "127.0.0.1:5555:5555"  # SSH tunnel for admin access
    environment:
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
    depends_on:
      - redis
      - worker
    networks:
      - lumen-net
    restart: unless-stopped


# ============================================================================
# Named Volumes
# ============================================================================
volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  qdrant_data:
    driver: local
  media_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${MEDIA_ROOT:-/data/media}
  worker_tmp:
    driver: local
  proxies_data:
    driver: local
  hf_cache:
    driver: local

# ============================================================================
# Networks
# ============================================================================
networks:
  lumen-net:
    driver: bridge
